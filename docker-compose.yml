version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fx_hustle_room
      POSTGRES_USER: fxuser
      POSTGRES_PASSWORD: fxpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app

volumes:
  postgres_data:
